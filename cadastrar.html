<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
    <h1>Pecuária Norte - Fazendas à Venda na Região Norte</h1>
    <nav>
        <a href="index.html">Início</a>
        <a href="sobre.html">Sobre</a>
    </nav>
    </header>

    <h2>Cadastrar uma fazenda</h2>

    <form>
        <fieldset>
            <legend>Cadastro</legend>

            <div>
                <label>Nome da fazenda:</label>
                <input type="text">
            </div>

            <div>
                <label>Local:</label>
                <input type="text">
            </div>
            
            <div>
                <label>Área:</label>
                <input type="text">
            </div>

            <div>
                <label>Preço:</label>
                <input type="number">
            </div>

            <div>
                <label>Imagens:</label>
                <input type="file" id="foto" name="foto" accept="image/*">
            </div>

            <button type="submit">Cadastrar</button>
        </fieldset>
    </form>

<footer>
    <p>© 2026 Pecuária Norte</p>
</footer>
</body>
</html>
